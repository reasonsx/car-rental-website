<a
  [routerLink]="['/car', car._id]"
  class="block h-full group"
>
  <div class="h-full flex flex-col bg-white rounded-xl shadow-sm overflow-hidden hover:shadow-md transition">

    <!-- IMAGE -->
    <div class="w-full h-40 bg-gray-100 overflow-hidden">

      @if (car.imageUrl) {
        <img
          [ngSrc]="car.imageUrl"
          [alt]="car.brand + ' ' + car.modelName"
          width="400"
          height="160"
          class="w-full h-full object-cover group-hover:scale-105 transition"
        />
      } @else {
        <div class="w-full h-full flex items-center justify-center text-gray-400 text-sm">
          No image
        </div>
      }

    </div>

    <!-- CONTENT -->
    <div class="flex flex-col flex-1 p-4 gap-2">

      <!-- TITLE -->
      <h3 class="font-semibold text-gray-800 text-sm">
        {{ car.brand }} {{ car.modelName }}
      </h3>

      <!-- META -->
      <p class="text-xs text-gray-500">
        {{ car.year }}
      </p>

      <!-- STATUS -->
      <span
        class="text-xs px-2 py-1 rounded-full w-fit"
        [class.bg-green-100]="car.available"
        [class.text-green-700]="car.available"
        [class.bg-red-100]="!car.available"
        [class.text-red-600]="!car.available"
      >
        {{ car.available ? 'Available' : 'Unavailable' }}
      </span>

      <!-- BOTTOM -->
      <div class="mt-auto flex items-center justify-between">

        <span class="font-semibold text-gray-900 text-sm">
          €{{ car.pricePerDay }}/day
        </span>

        <span class="text-xs text-blue-600 group-hover:underline">
          View
        </span>

      </div>

    </div>

  </div>
</a>
