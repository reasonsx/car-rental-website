<a
  [routerLink]="car() ? ['/car', car()._id] : null"
  class="block h-full group"
>
  <div class="h-full flex flex-col bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100 hover:shadow-md transition duration-200">

    <!-- IMAGE -->
    <div class="relative w-full aspect-[16/9]">

      @if (car()?.imageUrl) {
        <img
          [ngSrc]="car()!.imageUrl!"
          [alt]="car().brand + ' ' + car().modelName"
          fill
          class="object-cover object-center transition duration-300 group-hover:scale-105"
        />
      } @else {
        <div class="absolute inset-0 flex items-center justify-center text-gray-400 text-sm">
          No image
        </div>
      }

      <!-- STATUS -->
      <span
        class="absolute top-3 right-3 text-xs px-2 py-1 rounded-full font-medium shadow-sm backdrop-blur-sm"
        [class.bg-green-100]="car()?.available"
        [class.text-green-700]="car()?.available"
        [class.bg-red-100]="!car()?.available"
        [class.text-red-600]="!car()?.available"
      >
        {{ car()?.available ? 'Available' : 'Unavailable' }}
      </span>

    </div>

    <!-- CONTENT -->
    <div class="flex flex-col flex-1 p-4 gap-3">

      <!-- TITLE -->
      <div class="min-h-[48px]">
        <h3 class="font-semibold text-gray-800 text-base leading-tight line-clamp-2">
          {{ car()?.brand }} {{ car()?.modelName }}
        </h3>
        <p class="text-xs text-gray-500">
          {{ car()?.year }}
        </p>
      </div>

      <!-- PRICE -->
      <div class="mt-auto flex items-end justify-between">

        <div>
          <span class="text-xs text-gray-500 block">
            Price per day
          </span>
          <span class="font-semibold text-lg text-gray-900">
            {{ car()?.pricePerDay }} DKK
          </span>
        </div>

      </div>

    </div>

  </div>
</a>
