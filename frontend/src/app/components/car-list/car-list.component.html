<div class="w-full flex flex-col gap-6">

  <!-- HEADER -->
  <div class="flex items-center justify-between flex-wrap gap-4">

    <div>
      <h2 class="text-xl font-semibold text-gray-800 flex items-center gap-2">
        <i class="pi pi-car text-primary"></i>
        Available Cars
      </h2>
      <p class="text-sm text-gray-500">
        ({{ filteredCars().length }}) results
      </p>
    </div>

    <div class="flex gap-2">
      <p-button
        label="Reset filters"
        icon="pi pi-refresh"
        severity="secondary"
        size="small"
        [disabled]="!hasActiveFilters()"
        (onClick)="resetFilters()"
      />
    </div>

  </div>

  <!-- FILTER BAR -->
  <div class="flex flex-wrap gap-3">

    <!-- PRICE FILTER -->
    <input
      pInputText
      type="number"
      placeholder="Max price"
      class="w-40"
      (input)="maxPrice.set($any($event.target).valueAsNumber || null)"
    />

    <!-- FILTER BY BRAND -->
    <p-select
      [options]="brands()"
      [ngModel]="selectedBrand()"
      (ngModelChange)="selectedBrand.set($event)"
      placeholder="Brand"
      class="w-44"
    />

    <!-- SORT -->
    <p-select
      [options]="[
    { label: 'Price: Low to High', value: 'priceAsc', icon: 'pi pi-sort-amount-up' },
    { label: 'Price: High to Low', value: 'priceDesc', icon: 'pi pi-sort-amount-down' },
    { label: 'Newest First', value: 'yearDesc', icon: 'pi pi-calendar' }
  ]"
      [ngModel]="sort()"
      (ngModelChange)="sort.set($event)"
      placeholder="Sort by"
      class="w-52"
    >

      <!-- Selected value -->
      <ng-template pTemplate="selectedItem" let-option>
        <div class="flex items-center gap-2">
          <i [class]="option?.icon"></i>
          <span>{{ option?.label }}</span>
        </div>
      </ng-template>

      <!-- Dropdown options -->
      <ng-template pTemplate="item" let-option>
        <div class="flex items-center gap-2">
          <i [class]="option.icon"></i>
          <span>{{ option.label }}</span>
        </div>
      </ng-template>

    </p-select>

  </div>

  <!-- GRID -->
  @if (filteredCars().length) {

    <div class="grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
      @for (car of filteredCars(); track car._id) {
        <div class="h-full">
          <app-car-card [car]="car"></app-car-card>
        </div>
      }

    </div>

  } @else {

    <!-- EMPTY -->
    <div class="flex flex-col items-center justify-center py-16 gap-3 bg-gray-50 rounded-xl border border-dashed">

      <i class="pi pi-car text-3xl text-gray-400"></i>

      <p class="text-gray-500">
        No cars match your filters.
      </p>

    <p-button
      label="Reset filters"
      icon="pi pi-refresh"
      severity="secondary"
      size="small"
      [disabled]="!hasActiveFilters()"
      (onClick)="resetFilters()"
    />

    </div>

  }

</div>
