<div class="flex flex-col gap-2 mb-6">
  <label class="text-sm font-medium text-gray-700"> Choose location </label>

  <p-select
    [options]="locations()"
    optionLabel="name"
    optionValue="_id"
    [showClear]="true"
    placeholder="All locations"
    [ngModel]="selectedLocationId()"
    (ngModelChange)="onLocationChange($event)"
    class="w-full"
  />
</div>
