<div class="min-h-screen flex items-center justify-center px-4">

  <p-card class="w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">


    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
      class="flex flex-col gap-6 p-8"
    >

      <!-- HEADER -->
      <div class="text-center space-y-1">
        <h2 class="text-2xl font-semibold text-gray-800">
          {{ isLogin() ? 'Welcome back' : 'Create account' }}
        </h2>

        <p class="text-sm text-gray-500">
          {{ isLogin() ? 'Sign in to continue' : 'Start renting cars today' }}
        </p>
      </div>

      <!-- FORM FIELDS -->
      <div class="flex flex-col gap-4">

        @if (!isLogin()) {
          <input
            pInputText
            formControlName="name"
            placeholder="Full name"
            class="w-full rounded-lg"
          />
        }

        <input
          pInputText
          formControlName="email"
          placeholder="Email address"
          class="w-full rounded-lg"
        />

        <p-password
          formControlName="password"
          [toggleMask]="true"
          [feedback]="!isLogin()"
          class="w-full"
          inputStyleClass="w-full rounded-lg"
          placeholder="Password"
        />

        @if (!isLogin()) {
          <p-password
            formControlName="confirmPassword"
            [toggleMask]="true"
            [feedback]="false"
            class="w-full"
            inputStyleClass="w-full rounded-lg"
            placeholder="Confirm password"
          />
        }

      </div>

      <!-- ERROR -->
      @if (error()) {
        <div class="rounded-lg bg-red-50 border border-red-200 px-3 py-2 text-sm text-red-600 text-center">
          {{ error() }}
        </div>
      }

      <!-- ACTIONS -->
      <div class="flex flex-col gap-3">

        <!-- PRIMARY BUTTON -->
        <p-button
          type="submit"
          [label]="isLogin() ? 'Sign in' : 'Create account'"
          [icon]="isLogin() ? 'pi pi-sign-in' : 'pi pi-user-plus'"
          [loading]="loading()"
          styleClass="w-full"
        />

        <!-- TOGGLE -->
        <p-button
          type="button"
          (onClick)="toggleMode()"
          [text]="true"
          [label]="isLogin() ? 'Create account' : 'Back to login'"
          [icon]="isLogin() ? 'pi pi-user-plus' : 'pi pi-arrow-left'"
          styleClass="w-full text-sm"
        />

      </div>

      <!-- EXTRA -->
      @if (isLogin()) {
        <div class="text-center pt-2">
          <a
            routerLink="/cars"
            class="text-sm text-gray-500 hover:text-gray-800 underline transition"
          >
            Browse available cars
          </a>
        </div>
      }

    </form>

  </p-card>

</div>
