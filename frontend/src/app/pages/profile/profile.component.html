<div class="h-auto flex items-start justify-center px-4 py-10 bg-gray-50">
  <p-card class="w-full max-w-4xl shadow-xl rounded-2xl">
    <form [formGroup]="profileForm" (ngSubmit)="onUpdateProfile()" class="flex flex-col gap-6 p-8">
      <!-- HEADER -->
      <div class="text-center space-y-1">
        <h1 class="text-2xl font-semibold text-gray-800">My Profile</h1>
        <p class="text-sm text-gray-500">Manage your account details</p>
      </div>

      <!-- SUCCESS -->
      @if (success()) {
        <div
          class="rounded-lg bg-green-50 border border-green-200 px-4 py-2 text-sm text-green-700 text-center"
        >
          {{ success() }}
        </div>
      }

      <!-- ERROR -->
      @if (error()) {
        <div
          class="rounded-lg bg-red-50 border border-red-200 px-4 py-2 text-sm text-red-600 text-center"
        >
          {{ error() }}
        </div>
      }

      <!-- BASIC INFO -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- NAME -->
        <div class="flex flex-col gap-1">
          <label class="text-sm text-gray-600">Name</label>
          <input pInputText formControlName="name" class="w-full" placeholder="Your name" />
        </div>

        <!-- EMAIL -->
        <div class="flex flex-col gap-1">
          <label class="text-sm text-gray-600">Email</label>
          <input
            pInputText
            formControlName="email"
            class="w-full"
            placeholder="email@example.com"
          />
        </div>
      </div>

      <!-- PASSWORD SECTION (NO UGLY BORDER) -->
      <div class="flex flex-col gap-4 pt-4">
        <div class="bg-gray-50 rounded-xl p-4 flex flex-col gap-4">
          <h3 class="text-sm font-medium text-gray-700">Change Password</h3>

          <p-password
            formControlName="currentPassword"
            [toggleMask]="true"
            class="w-full"
            inputStyleClass="w-full"
            placeholder="Current password"
          />

          <p-password
            formControlName="newPassword"
            [toggleMask]="true"
            class="w-full"
            inputStyleClass="w-full"
            placeholder="New password"
          />

          <p-password
            formControlName="confirmNewPassword"
            [toggleMask]="true"
            class="w-full"
            inputStyleClass="w-full"
            placeholder="Confirm new password"
          />

          @if (profileForm.errors?.["passwordMismatch"]) {
            <span class="text-sm text-red-500 text-center"> Passwords do not match </span>
          }
        </div>
      </div>

      <!-- ACTION -->
      <p-button
        type="submit"
        label="Update profile"
        icon="pi pi-save"
        [loading]="isLoading()"
        [disabled]="profileForm.invalid || isLoading()"
        styleClass="w-full"
      />

      <!-- ADMIN -->
      @if (isAdmin()) {
        <div class="flex flex-col gap-3 pt-4 text-center">
          <span class="text-sm text-gray-500"> Admin access </span>

          <p-button
            label="Admin Dashboard"
            icon="pi pi-cog"
            (onClick)="goToAdminDashboard()"
            severity="secondary"
            styleClass="w-full"
          />
        </div>
      }
    </form>
  </p-card>
</div>
