<div class="flex flex-col gap-6">
  <!-- HEADER -->
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-xl font-semibold text-gray-800">Locations Management</h2>
      <p class="text-sm text-gray-500">Manage locations</p>
    </div>

    <p-button
      icon="pi pi-refresh"
      label="Refresh"
      severity="secondary"
      size="small"
      (onClick)="loadLocations()"
    />
  </div>

  <!-- ALERTS -->
  @if (error()) {
    <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-2 rounded-lg text-sm">
      {{ error() }}
    </div>
  }

  @if (success()) {
    <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-2 rounded-lg text-sm">
      {{ success() }}
    </div>
  }

  <!-- FORM -->
  <div class="bg-white shadow rounded-2xl p-6">
    <form [formGroup]="form" (ngSubmit)="saveLocation()" class="grid gap-4 md:grid-cols-2">
      <input pInputText formControlName="name" placeholder="Name" />
      <input pInputText formControlName="city" placeholder="City" />

      <input pInputText formControlName="address" placeholder="Address" />
      <input pInputText formControlName="phone" placeholder="Phone" />

      <!-- ACTIONS -->
      <div class="flex gap-2 md:col-span-2 pt-2">
        <p-button
          type="submit"
          [label]="selectedLocation() ? 'Update Location' : 'Create Location'"
          icon="pi pi-save"
          [disabled]="form.invalid"
        />

        <p-button label="Cancel" icon="pi pi-times" severity="secondary" (onClick)="cancelEdit()" />
      </div>
    </form>
  </div>

  <!-- TABLE -->
  <div class="bg-white shadow rounded-2xl p-6">
    <h3 class="text-lg font-medium text-gray-700 mb-4">Existing locations</h3>

    <p-table [value]="locations()" [paginator]="true" [rows]="8">
      <ng-template pTemplate="header">
        <tr>
          <th>Name</th>
          <th>City</th>
          <th>Address</th>
          <th>Phone</th>
          <th></th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-location>
        <tr>
          <td class="font-medium">
            {{ location.name }}
          </td>

          <td>{{ location.city }}</td>
          <td>{{ location.address }}</td>
          <td>{{ location.phone }}</td>

          <td class="flex gap-2">
            <p-button
              icon="pi pi-pencil"
              size="small"
              [text]="true"
              (onClick)="editLocation(location)"
            />

            <p-button
              icon="pi pi-trash"
              size="small"
              severity="danger"
              [text]="true"
              (onClick)="deleteLocation(location._id)"
            />
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
